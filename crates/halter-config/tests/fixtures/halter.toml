version = 1

[models.default]
provider = "openai"
model = "gpt-5"
reasoning = "medium"

[models.subagent]
provider = "openrouter"
model = "openai/gpt-5-mini"
reasoning = "medium"

[resources.skills]
roots = ["./.agent/skills"]

[resources.plugins]
roots = ["./.agent/plugins"]

[tools]
enabled = ["read", "glob", "grep", "write", "edit", "shell", "task"]

[policy]
allowed_write_roots = ["./", "/tmp/halter"]
max_read_bytes = 1048576
max_subagent_depth = 3
max_concurrent_subagents = 8

[policy.shell]
enabled = true
allow = ["git", "cargo", "rg", "ls", "find", "true", "cd"]
timeout_secs = 30

[policy.network]
enabled = false
allowed_hosts = []

[sessions]
backend = "memory"
