# Example config for the halter harness.
# Set OPENAI_API_KEY in your environment, or define [providers.openai].api_key below.
# Logging is silent by default. Set RUST_LOG=info (or a more specific filter) to enable it.

version = 1

[models.default]
provider = "openai"
model = "gpt-5.4"
reasoning = "xhigh"
# tokens_per_minute = 500_000  # Default: 500,000. Proactive token budget for rate limiting.

[models.subagent]
provider = "openai"
model = "gpt-5.4-mini"
reasoning = "medium"

# [providers.openai]
# base_url = "https://myproxy.example.com"
# api_key = "sk-..."

[resources.skills]
roots = ["./.agent/skills"]

[resources.plugins]
roots = ["./.agent/plugins"]

[tools]
enabled = [
  # Built-in read tools.
  "read",
  "glob",
  "grep",
  "profile", # requires the `profiling` feature

  # Built-in write or side-effecting tools.
  "write",
  "edit",
  "shell",
  "process",
  "pty",      # requires the `pty` feature
  "ast_grep", # requires the `ast-tools` feature; `find` reads, `replace` writes
  "image",    # requires the `image-tools` feature; `info` reads, `resize`/`convert` can write

  # Subagent read tools.
  "wait_agent",

  # Subagent write tools.
  "spawn_agent",
  "send_input",
  "close_agent",
]

[context]
compaction_threshold = 200_000   # Trigger compaction when estimated tokens reach
                               # this threshold, with a 100-token buffer.
pre_compaction_target = 150_000  # Evict low-signal history down to this target
                               # before calling /v1/responses/compact.
prune_signal_threshold = "low" # Evict up through very_low/low/normal.

[policy]
allowed_write_roots = ["./", "/tmp/halter"]
max_read_bytes = 1048576
max_tool_output_bytes = 262144
max_subagent_depth = 3
max_concurrent_subagents = 8

[policy.shell]
enabled = true
allow = ["git", "cargo", "rg", "ls", "find", "python", "pwd", "cwd", "echo"]
timeout_secs = 30

[sessions]
backend = "memory"
# sqlite_path = "/tmp/halter/sessions.db"
